name: Supabase Keep-Alive

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    name: Ping Supabase DB
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          response=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -X GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Supabase is alive and responding."
          else
            echo "Unexpected response: $response"
            exit 1
          fi
